<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css" type="text/css">
    <link rel="stylesheet" href="assets/css/style.responsive.css" type="text/css">
    <title>Sample Project 2</title>
    <script src="assets/js/index.js" type="text/javascript"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1>Welcome</h1>
            <nav>
                <ul>
                    <li><a href="./">Home</a></li>
                    <li><a href="#">Top</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main id="projects">
        <section>
            <h2>Projects</h2>
            <div id="search-ui">
                <input type="text" id="search-input" placeholder="Search project title here..." />
            </div>
            <div id="projects-container">
            
            </div>
        </section>
        
    </main>
    <footer id="contact">
        <div class="container">
        <h2>Contact me</h2>
        <form action="./index.html" method="post">
            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" readonly value="" />    
            </div>

            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" readonly value="" />    
            </div>

            <div>
                <label for="subject">Subject</label>
                <select name="subject" id="subject" readonly>
                    <option value="">Please choose an item</option>
                    <option value="I want to offer you a position">I want to offer you a position</option>
                </select>
            </div>

            <div>
                <label for="message">Message</label>
                <textarea name="message" id="message"></textarea>   
            </div>

            <button>Send</button>
        </form>
        </div>
    </footer>
</body>
</html>
